<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #333144; font-family: Arial, sans-serif;
  display: flex;
}
.header {
  padding: 20pt 40pt;
}
h1 {
  color: #ffffff; font-size: 24pt; font-weight: bold; margin: 0;
}
.subtitle {
  color: #ff6600; font-size: 14pt; margin-top: 8pt;
}
.content {
  flex: 1; display: flex; gap: 20pt;
}
.data-card {
  width: 180pt; background: rgba(255,255,255,0.1); border-radius: 10pt;
  padding: 15pt;
}
.card-title {
  color: #ffffff; font-size: 12pt; font-weight: bold;
  margin: 0 0 5pt;
}
.card-num {
  color: #019e7c; font-size: 22pt; font-weight: bold;
  margin-bottom: 3pt;
}
.card-desc {
  color: #cccccc; font-size: 9pt;
}
.source-label {
  color: #ff6600; font-size: 10pt; font-weight: bold;
}
.data-card.teal {
  border-color: #14b8a6;
}
.card-desc.teal {
  color: #ffffff; font-size: 9pt;
}
.source-label.green{
  border-color: #019e7c;
}
.source-label.purple {
  border-color: #220bb1;
}
.source-label.yellow {
  border-color: #e29420;
}
</style>
</head>
<body>
<div class="header">
  <h1>Your Complete picture</h1>
  <p class="subtitle">3 Data points reveal the gaps between your current state and 12-month vision</p>
</div>
<div class="content">
  <div class="data-card teal">
    <div class="data-card purple">
      <p class="card-title">3. Tech Readiness Score</p>
      <p class="card-desc">Current capabilities and digital proficiency</p>
      <p class="card-desc">Future-of-work readiness</p>
    </div>
    <div class="data-card yellow">
      <p class="card-title">4. Website Analysis</p>
      <p class="card-desc">How your OCEAN profile affects your AI roadmap</p>
    </div>
  </ </<div>
</div>
</body>
</html>
