<!DOCTYPE html>
<html>
<head>
<style>
html { background: #FFFFFF; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #FFFFFF; font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
}
.header {
  background: #0F0568;
  padding: 12pt 0;
  display: flex;
  align-items: center;
}
.accent-bar {
  background: #FF6600;
  width: 8pt;
  height: 45pt;
  margin-right: 15pt;
}
.header h1 {
  color: #FFFFFF;
  font-size: 18pt;
  font-weight: bold;
  margin: 0;
}
.content {
  padding: 20pt 40pt;
  display: flex;
  gap: 25pt;
}
.stat-box {
  background: #F5F5F5;
  border-top: 4pt solid #FF6600;
  padding: 15pt;
  width: 180pt;
  text-align: center;
}
.stat-box h2 {
  color: #FF6600;
  font-size: 28pt;
  font-weight: bold;
  margin: 0 0 8pt 0;
}
.stat-box p {
  color: #333333;
  font-size: 11pt;
  margin: 0;
}
.bottom-text {
  padding: 0 40pt;
}
.bottom-text p {
  color: #000066;
  font-size: 12pt;
  font-style: italic;
  margin: 0;
}
</style>
</head>
<body>
<div class="header">
  <div class="accent-bar"></div>
  <h1>Why Tech Readiness Matters</h1>
</div>
<div class="content">
  <div class="stat-box">
    <h2>10X</h2>
    <p>Training ROI with tech-enabled coaching</p>
  </div>
  <div class="stat-box">
    <h2>58%</h2>
    <p>Higher employee retention rate</p>
  </div>
  <div class="stat-box">
    <h2>2.5X</h2>
    <p>Faster promotion rate for tech-ready leaders</p>
  </div>
</div>
<div class="bottom-text">
  <p>Tech readiness is not just about skills - it is about adaptability in a changing business landscape.</p>
</div>
</body>
</html>
