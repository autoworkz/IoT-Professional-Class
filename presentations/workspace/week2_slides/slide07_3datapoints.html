<!DOCTYPE html>
<html>
<head>
<style>
html { background: #FFFFFF; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #FFFFFF; font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
}
.header {
  background: #0F0568;
  padding: 12pt 0;
  display: flex;
  align-items: center;
}
.accent-bar {
  background: #FF6600;
  width: 8pt;
  height: 45pt;
  margin-right: 15pt;
}
.header h1 {
  color: #FFFFFF;
  font-size: 18pt;
  font-weight: bold;
  margin: 0;
}
.content {
  padding: 20pt 40pt;
}
.content h2 {
  color: #FF6600;
  font-size: 20pt;
  font-weight: bold;
  margin: 0 0 15pt 0;
}
.data-row {
  display: flex;
  gap: 15pt;
  margin-bottom: 15pt;
}
.data-box {
  background: #0F0568;
  padding: 15pt;
  width: 200pt;
  text-align: center;
}
.data-box h3 {
  color: #FF6600;
  font-size: 14pt;
  font-weight: bold;
  margin: 0 0 8pt 0;
}
.data-box p {
  color: #FFFFFF;
  font-size: 11pt;
  margin: 0;
}
.equals p {
  color: #FF6600;
  font-size: 24pt;
  font-weight: bold;
  margin: 0;
  padding-top: 20pt;
}
.result-box {
  background: #FF6600;
  padding: 15pt;
  width: 200pt;
  text-align: center;
}
.result-box h3 {
  color: #FFFFFF;
  font-size: 14pt;
  font-weight: bold;
  margin: 0 0 8pt 0;
}
.result-box p {
  color: #FFFFFF;
  font-size: 11pt;
  margin: 0;
}
</style>
</head>
<body>
<div class="header">
  <div class="accent-bar"></div>
  <h1>Your Complete Business Picture: 3 Data Points</h1>
</div>
<div class="content">
  <h2>When combined, these reveal your complete business profile:</h2>
  <div class="data-row">
    <div class="data-box">
      <h3>OCEAN Profile</h3>
      <p>Who you are naturally</p>
    </div>
    <div class="data-box">
      <h3>Vision Board</h3>
      <p>Where you want to go</p>
    </div>
    <div class="data-box">
      <h3>Tech Readiness</h3>
      <p>How ready you are for change</p>
    </div>
    <div class="equals"><p>=</p></div>
    <div class="result-box">
      <h3>Complete Picture</h3>
      <p>Your strategic business identity</p>
    </div>
  </div>
</div>
</body>
</html>
