<!DOCTYPE html>

<style>

body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  background: #0f0568;
}
.week-label {
  background: #ff6600;
  color: #ffffff;

}
h1 { color: #ffffff; font-size: 36pt; margin: 0 0 10pt 0; text-align: center; }
.theme { color: #ff6600; font-size: 20pt; margin-bottom: 30pt; text-align: center; }
.tagline {
  color: #aaaaaa;
  font-size: 14pt;
  font-style: italic;
  text-align: center;
  max-width: 500pt;
}
</style>
</head>
<body>
<p class="week-label">WEEK 1</p>
